<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="Smart C Cleaner">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".4"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg2)"/>
  <rect x="0" y="0" width="1280" height="56" fill="#010409"/>
  <circle cx="28" cy="28" r="7" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="7" fill="#febc2e"/>
  <circle cx="76" cy="28" r="7" fill="#28c840"/>
  <text x="640" y="36" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">Smart C Cleaner</text>

  <g filter="url(#shadow2)">
    <rect x="56" y="88" width="1168" height="672" rx="20" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

    <rect x="88" y="120" width="360" height="608" rx="16" fill="#161b22" stroke="#30363d"/>
    <text x="268" y="168" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="16">Disk Usage</text>
    <circle cx="268" cy="330" r="118" fill="none" stroke="#30363d" stroke-width="22"/>
    <circle cx="268" cy="330" r="118" fill="none" stroke="#58a6ff" stroke-width="22" stroke-dasharray="520 740" stroke-linecap="round" transform="rotate(-90 268 330)"/>
    <text x="268" y="318" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="42" font-weight="700">C:</text>
    <text x="268" y="358" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="18">68% used</text>
    <text x="268" y="500" text-anchor="middle" fill="#3fb950" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">12.4 GB</text>
    <text x="268" y="532" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">can be cleaned</text>

    <rect x="480" y="120" width="712" height="608" rx="16" fill="#161b22" stroke="#30363d"/>
    <text x="512" y="168" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600">Scan Results</text>
    <rect x="512" y="188" width="120" height="28" rx="14" fill="rgba(88,166,255,.15)"/>
    <text x="572" y="207" text-anchor="middle" fill="#58a6ff" font-family="Segoe UI, sans-serif" font-size="13">Safe</text>
    <rect x="644" y="188" width="120" height="28" rx="14" fill="rgba(210,153,34,.12)"/>
    <text x="704" y="207" text-anchor="middle" fill="#d29922" font-family="Segoe UI, sans-serif" font-size="13">Deep</text>

    <g fill="#0d1117" stroke="#30363d">
      <rect x="512" y="236" width="648" height="56" rx="10" fill="#21262d"/>
      <rect x="528" y="256" width="18" height="18" rx="4" fill="#238636" stroke="#3fb950"/>
      <text x="560" y="270" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16">Windows Temp files</text>
      <text x="1130" y="270" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">4.2 GB</text>

      <rect x="512" y="304" width="648" height="56" rx="10" fill="#21262d"/>
      <rect x="528" y="324" width="18" height="18" rx="4" fill="#238636" stroke="#3fb950"/>
      <text x="560" y="338" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16">Browser cache</text>
      <text x="1130" y="338" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">2.8 GB</text>

      <rect x="512" y="372" width="648" height="56" rx="10" fill="#21262d"/>
      <rect x="528" y="392" width="18" height="18" rx="4" fill="#238636" stroke="#3fb950"/>
      <text x="560" y="406" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16">Recycle Bin</text>
      <text x="1130" y="406" text-anchor="end" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">1.9 GB</text>

      <rect x="512" y="440" width="648" height="56" rx="10" fill="#21262d"/>
      <rect x="528" y="460" width="18" height="18" rx="4" fill="#21262d" stroke="#d29922"/>
      <text x="560" y="474" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16">Software leftover logs</text>
      <text x="1130" y="474" text-anchor="end" fill="#d29922" font-family="Segoe UI, sans-serif" font-size="15">3.5 GB</text>
    </g>

    <rect x="512" y="590" width="220" height="52" rx="26" fill="#238636"/>
    <text x="622" y="622" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">Start Clean</text>
    <rect x="748" y="590" width="180" height="52" rx="26" fill="none" stroke="#30363d" stroke-width="2"/>
    <text x="838" y="622" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="16">Rescan</text>
  </g>
</svg>
