<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" role="img" aria-label="AI Voice Drawing Tool">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="56" fill="#121a24"/>
  <circle cx="28" cy="28" r="7" fill="#ff5f57"/>
  <circle cx="52" cy="28" r="7" fill="#febc2e"/>
  <circle cx="76" cy="28" r="7" fill="#28c840"/>
  <text x="640" y="36" text-anchor="middle" fill="#e8edf4" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">AI Voice Canvas</text>

  <g filter="url(#shadow)">
    <rect x="48" y="88" width="820" height="672" rx="18" fill="#fafbfc" stroke="#2d3a4f" stroke-width="2"/>
    <circle cx="280" cy="300" r="88" fill="#ff6b6b" opacity=".92"/>
    <rect x="430" y="390" width="220" height="130" rx="10" fill="#4f9cf9" opacity=".88"/>
    <polygon points="720,520 820,390 920,520" fill="#3dd68c" opacity=".9"/>
    <line x1="180" y1="560" x2="620" y2="220" stroke="#f5a623" stroke-width="8" stroke-linecap="round"/>
    <circle cx="520" cy="480" r="6" fill="#0f1419" opacity=".25"/>
  </g>

  <rect x="900" y="88" width="332" height="672" rx="18" fill="#1a2332" stroke="#2d3a4f" stroke-width="2"/>
  <rect x="928" y="116" width="276" height="72" rx="12" fill="#243044"/>
  <circle cx="956" cy="152" r="10" fill="#3dd68c"/>
  <text x="980" y="148" fill="#e8edf4" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">Listening</text>
  <text x="980" y="172" fill="#8b9cb3" font-family="Segoe UI, sans-serif" font-size="14">Voice control active</text>

  <text x="928" y="230" fill="#8b9cb3" font-family="Segoe UI, sans-serif" font-size="14">Mic level</text>
  <rect x="928" y="244" width="276" height="14" rx="7" fill="#243044"/>
  <rect x="928" y="244" width="198" height="14" rx="7" fill="#4f9cf9"/>

  <text x="928" y="310" fill="#8b9cb3" font-family="Segoe UI, sans-serif" font-size="14">Recognized</text>
  <rect x="928" y="324" width="276" height="88" rx="10" fill="#121a24"/>
  <text x="944" y="358" fill="#e8edf4" font-family="Segoe UI, sans-serif" font-size="16">Draw a red circle</text>
  <text x="944" y="386" fill="#8b9cb3" font-family="Segoe UI, sans-serif" font-size="14">then a blue rectangle</text>

  <text x="928" y="456" fill="#8b9cb3" font-family="Segoe UI, sans-serif" font-size="14">Commands</text>
  <rect x="928" y="470" width="276" height="36" rx="8" fill="#243044"/>
  <text x="944" y="493" fill="#c5d4e8" font-family="Segoe UI, sans-serif" font-size="13">Undo / Clear canvas</text>
  <rect x="928" y="514" width="276" height="36" rx="8" fill="#243044"/>
  <text x="944" y="537" fill="#c5d4e8" font-family="Segoe UI, sans-serif" font-size="13">Move brush to center</text>

  <circle cx="1066" cy="700" r="42" fill="#4f9cf9" opacity=".18"/>
  <rect x="1044" y="676" width="44" height="56" rx="22" fill="#4f9cf9"/>
  <rect x="1054" y="700" width="24" height="18" rx="8" fill="#0f1419" opacity=".15"/>
</svg>
