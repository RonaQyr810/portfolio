<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD · 上海市陆生野生动物收容救护管理平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #f4f7f5;
      --surface: #ffffff;
      --text: #1a2e24;
      --muted: #5c6b63;
      --accent: #2d8f5f;
      --accent-light: #e8f5ee;
      --accent-dark: #1e6b47;
      --border: rgba(45, 143, 95, 0.12);
      --shadow: 0 4px 24px rgba(26, 46, 36, 0.06);
      --code-bg: #f0f4f2;
      --sidebar-w: 260px;
      --header-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      font-size: 15px;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    .topbar-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .topbar-back:hover { color: var(--accent); }
    .topbar-title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar-badge {
      margin-left: auto;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent-dark);
      background: var(--accent-light);
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1280px;
      margin: 0 auto;
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Sidebar TOC ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      padding: 28px 16px 48px 24px;
      border-right: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.5);
    }
    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .toc { list-style: none; }
    .toc a {
      display: block;
      padding: 5px 10px;
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: none;
      border-radius: 8px;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      line-height: 1.4;
    }
    .toc a:hover { color: var(--accent); background: var(--accent-light); }
    .toc a.active {
      color: var(--accent-dark);
      background: var(--accent-light);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .toc .toc-h3 { padding-left: 22px; font-size: 0.78rem; }

    /* ── Main content ── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 40px 48px 80px;
    }

    /* ── Hero meta card ── */
    .hero-card {
      background: linear-gradient(135deg, #2d8f5f 0%, #1a6b45 100%);
      color: #fff;
      border-radius: 20px;
      padding: 32px 36px;
      margin-bottom: 40px;
      box-shadow: var(--shadow);
    }
    .hero-card h1 {
      font-size: clamp(1.4rem, 3vw, 1.85rem);
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #fff;
      border: none;
      padding: 0;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .hero-chip {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .hero-source {
      margin-top: 14px;
      font-size: 0.85rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    /* ── Markdown prose ── */
    .prose h1 { display: none; } /* rendered in hero */
    .prose > p:first-of-type { display: none; } /* meta moved to hero */

    .prose h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      margin: 48px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-light);
      scroll-margin-top: calc(var(--header-h) + 16px);
    }
    .prose h2:first-child { margin-top: 0; }

    .prose h3 {
      font-size: 1.08rem;
      font-weight: 600;
      color: var(--accent-dark);
      margin: 32px 0 14px;
      scroll-margin-top: calc(var(--header-h) + 16px);
    }

    .prose h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 24px 0 10px;
      color: var(--text);
    }

    .prose p { margin-bottom: 14px; color: #2a3d34; }
    .prose strong { color: var(--text); font-weight: 600; }

    .prose hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 36px 0;
    }

    .prose ul, .prose ol {
      margin: 0 0 16px 1.4em;
      color: #2a3d34;
    }
    .prose li { margin-bottom: 6px; }
    .prose li::marker { color: var(--accent); }

    .prose blockquote {
      margin: 20px 0;
      padding: 16px 20px;
      background: var(--accent-light);
      border-left: 4px solid var(--accent);
      border-radius: 0 12px 12px 0;
      color: var(--accent-dark);
      font-size: 0.92rem;
    }
    .prose blockquote p { margin: 0; color: inherit; }

    /* ── Tables ── */
    .table-wrap {
      overflow-x: auto;
      margin: 20px 0 28px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      background: var(--surface);
    }
    .prose thead { background: var(--accent-light); }
    .prose th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--accent-dark);
      border-bottom: 2px solid rgba(45, 143, 95, 0.2);
      white-space: nowrap;
    }
    .prose td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      color: #2a3d34;
    }
    .prose tbody tr:last-child td { border-bottom: none; }
    .prose tbody tr:hover td { background: rgba(45, 143, 95, 0.04); }

    /* ── Code / wireframe blocks ── */
    .prose pre:not(.mermaid) {
      background: #1e2a24;
      color: #c8e6d4;
      border-radius: 14px;
      padding: 20px 22px;
      overflow-x: auto;
      margin: 20px 0 28px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 0.78rem;
      line-height: 1.55;
      box-shadow: var(--shadow);
    }
    .prose pre:not(.mermaid) code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }
    .prose :not(pre) > code {
      background: var(--code-bg);
      color: var(--accent-dark);
      padding: 2px 7px;
      border-radius: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.84em;
    }

    /* ── Mermaid ── */
    .mermaid-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin: 24px 0 32px;
      overflow-x: auto;
      box-shadow: var(--shadow);
    }
    .mermaid-wrap .mermaid {
      display: flex;
      justify-content: center;
      min-height: 120px;
    }
    .mermaid-wrap svg {
      max-width: 100%;
      height: auto;
    }

    /* ── Section cards for major sections ── */
    .prose h2 + p,
    .prose h2 + .table-wrap,
    .prose h2 + blockquote {
      /* natural flow */
    }

    /* ── Loading / error ── */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fff2f0;
      border: 1px solid #ffccc7;
      border-radius: 12px;
      padding: 20px 24px;
      color: #cf1322;
      margin: 40px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { padding: 28px 20px 60px; }
      .hero-card { padding: 24px; border-radius: 16px; }
    }

    @media print {
      .topbar, .sidebar { display: none; }
      .main { padding: 0; }
      .hero-card { background: none; color: #000; box-shadow: none; border: 1px solid #ccc; }
      .hero-chip { background: #eee; color: #333; border-color: #ccc; }
      .prose pre { background: #f5f5f5; color: #333; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbar-back" href="../index.html">← 返回项目</a>
    <span class="topbar-title">PRD · 野生动物收容救护管理平台</span>
    <span class="topbar-badge">v4.0</span>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">目录</div>
      <nav><ul class="toc" id="toc"></ul></nav>
    </aside>

    <main class="main">
      <div class="hero-card" id="hero">
        <h1>PRD：上海市陆生野生动物收容救护管理平台（H5版）</h1>
        <div class="hero-meta" id="hero-meta"></div>
        <p class="hero-source" id="hero-source"></p>
      </div>

      <div id="content">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>正在加载文档…</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const MD_FILE = '野生动物收容救护平台-PRD-v4-极简8页版.md';

    async function fetchMarkdown() {
      const candidates = [
        MD_FILE,
        encodeURI(MD_FILE),
      ];
      for (const url of candidates) {
        const res = await fetch(url);
        if (res.ok) return res.text();
      }
      throw new Error('找不到 PRD 源文件（' + MD_FILE + '）');
    }

    marked.setOptions({
      gfm: true,
      breaks: false,
    });

    function prepareMermaidBlocks(root) {
      root.querySelectorAll('pre > code[class*="mermaid"]').forEach((codeEl) => {
        const wrap = document.createElement('div');
        wrap.className = 'mermaid-wrap';
        const diagram = document.createElement('div');
        diagram.className = 'mermaid';
        diagram.textContent = codeEl.textContent;
        wrap.appendChild(diagram);
        codeEl.parentElement.replaceWith(wrap);
      });
    }

    async function renderMermaid(root) {
      const nodes = root.querySelectorAll('.mermaid');
      if (!nodes.length) return;

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'base',
        themeVariables: {
          primaryColor: '#e8f5ee',
          primaryTextColor: '#1a2e24',
          primaryBorderColor: '#2d8f5f',
          lineColor: '#5c6b63',
          secondaryColor: '#f4f7f5',
          tertiaryColor: '#fff',
          noteBkgColor: '#f4f7f5',
          noteTextColor: '#1a2e24',
        },
        flowchart: { curve: 'basis', padding: 16, htmlLabels: true },
        sequence: { actorMargin: 60, messageMargin: 40, useMaxWidth: true },
      });

      await mermaid.run({ nodes });
    }

    function slugify(text) {
      return text
        .replace(/[^\u4e00-\u9fff\w\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .slice(0, 60) || 'section';
    }

    function buildToc(container) {
      const toc = document.getElementById('toc');
      const headings = container.querySelectorAll('h2, h3');
      const seen = new Set();

      headings.forEach((h, i) => {
        let id = slugify(h.textContent);
        if (seen.has(id)) id = id + '-' + i;
        seen.add(id);
        h.id = id;

        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h.textContent;
        if (h.tagName === 'H3') a.classList.add('toc-h3');
        li.appendChild(a);
        toc.appendChild(li);
      });

      const links = toc.querySelectorAll('a');
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              links.forEach((l) => l.classList.remove('active'));
              const active = toc.querySelector('a[href="#' + entry.target.id + '"]');
              if (active) active.classList.add('active');
            }
          });
        },
        { rootMargin: '-80px 0px -70% 0px', threshold: 0 }
      );
      headings.forEach((h) => observer.observe(h));
    }

    function parseHeroMeta(lines) {
      const metaEl = document.getElementById('hero-meta');
      const sourceEl = document.getElementById('hero-source');

      const metaLine = lines.find((l) => l.includes('产品类型'));
      if (metaLine) {
        const parts = metaLine.replace(/\*\*/g, '').split('|').map((s) => s.trim());
        parts.forEach((part) => {
          if (!part) return;
          const chip = document.createElement('span');
          chip.className = 'hero-chip';
          chip.textContent = part;
          metaEl.appendChild(chip);
        });
      }

      const sourceLine = lines.find((l) => l.includes('需求来源'));
      if (sourceLine) {
        sourceEl.textContent = sourceLine.replace(/\*\*/g, '').trim();
      }
    }

    async function loadPrd() {
      const content = document.getElementById('content');
      try {
        const md = await fetchMarkdown();
        const lines = md.split('\n');

        parseHeroMeta(lines);

        const html = marked.parse(md);
        content.innerHTML = '<article class="prose">' + html + '</article>';

        content.querySelectorAll('.prose table').forEach((table) => {
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap';
          table.replaceWith(wrap);
          wrap.appendChild(table);
        });

        prepareMermaidBlocks(content);
        buildToc(content);
        await renderMermaid(content);
      } catch (err) {
        content.innerHTML =
          '<div class="error">文档加载失败：' +
          err.message +
          '。请通过本地服务器或部署站点访问此页面。</div>';
      }
    }

    loadPrd();
  </script>
</body>
</html>
